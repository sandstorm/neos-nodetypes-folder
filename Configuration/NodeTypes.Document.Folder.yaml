"Sandstorm.NodeTypes.Folder:Document.Folder":
  superTypes:
    "Neos.Neos:Shortcut": true
    "Sandstorm.NodeTypes.Folder:Mixin.HideUriSegment": true
  ui:
    label: "i18n"
    icon: "folder"
  properties:
    _hiddenInIndex:
      defaultValue: true
    # Set default targetMode of Folder to "noTarget".
    targetMode:
      defaultValue: 'noTarget'
      ui:
        inspector:
          editorOptions:
            values:
              # Add an option to have "no target" for the ShortCut NodeType
              noTarget:
                label: i18n
